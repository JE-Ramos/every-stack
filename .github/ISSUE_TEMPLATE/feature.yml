name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
    - type: textarea
      id: problem
      attributes:
          label: Problem
          description: What problem does this solve? Who is affected?
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: Proposed solution
          description: How should this work?
      validations:
          required: true

    - type: dropdown
      id: package
      attributes:
          label: Package
          options:
              - frontend
              - backend
              - core
              - utils
              - config
              - content
              - ai
              - ui
              - other
      validations:
          required: true
