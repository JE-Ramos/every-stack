name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
    - type: textarea
      id: description
      attributes:
          label: What happened?
          description: Clear description of the bug
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
          description: What should have happened instead?
      validations:
          required: true

    - type: textarea
      id: reproduce
      attributes:
          label: Steps to reproduce
          description: Minimal steps to reproduce the issue
          value: |
              1.
              2.
              3.
      validations:
          required: true

    - type: dropdown
      id: package
      attributes:
          label: Package
          options:
              - frontend
              - backend
              - core
              - utils
              - config
              - content
              - ai
              - ui
              - other
      validations:
          required: true
