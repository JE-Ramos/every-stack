name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    install:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - uses: actions/cache/save@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                  key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

    lint:
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                  key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

            - run: pnpm lint

    format:
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                  key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

            - run: pnpm format:check

    typecheck:
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                  key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

            - run: pnpm typecheck

    test:
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                  key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

            - run: pnpm test:coverage

            - uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 14

    build:
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                  key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

            - run: pnpm build

            - name: Check bundle size
              run: pnpm size

            - uses: actions/upload-artifact@v7
              with:
                  name: frontend-dist
                  path: packages/frontend/dist/
                  retention-days: 7
